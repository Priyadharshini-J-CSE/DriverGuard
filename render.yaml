services:
  # ── Backend ──────────────────────────────────────────────────
  - type: web
    name: deliverguard-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: WAQI_TOKEN
        sync: false
      - key: TOMTOM_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
      - key: OCR_SERVICE_URL
        value: http://localhost:5001
      - key: FRONTEND_URL
        sync: false

  # ── Frontend ─────────────────────────────────────────────────
  - type: web
    name: deliverguard-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
